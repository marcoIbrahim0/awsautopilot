name: Migration Gate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  migration-gate:
    name: Migration Gate
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: security_autopilot_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d security_autopilot_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/security_autopilot_ci
      DATABASE_URL_SYNC: postgresql+psycopg2://postgres:postgres@localhost:5432/security_autopilot_ci
      ENV: ci
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Backend Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Upgrade Database To Head
        run: alembic upgrade head

      - name: Verify Alembic Head/Current
        run: python scripts/check_migration_gate.py
