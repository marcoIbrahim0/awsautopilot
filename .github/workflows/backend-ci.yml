name: Backend CI Matrix

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  backend-tests:
    name: Backend Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: security_autopilot_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d security_autopilot_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      PYTHONPATH: .
      ENV: ci
      AWS_REGION: us-east-1
      SAAS_AWS_ACCOUNT_ID: "029037611564"
      JWT_SECRET: ci-test-secret
      CONTROL_PLANE_EVENTS_SECRET: ci-test-secret
      DIGEST_CRON_SECRET: ci-test-secret
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/security_autopilot_ci
      DATABASE_URL_SYNC: postgresql+psycopg2://postgres:postgres@localhost:5432/security_autopilot_ci
      SQS_INGEST_QUEUE_URL: https://sqs.us-east-1.amazonaws.com/029037611564/security-autopilot-ingest-queue
      S3_EXPORT_BUCKET: security-autopilot-ci-export-bucket
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/workers/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install -r backend/workers/requirements.txt

      - name: Run migrations
        run: alembic upgrade head

      - name: Run backend tests
        run: |
          pytest -q \
            tests/test_aws_service.py \
            tests/test_register_account.py \
            tests/test_validate_account.py \
            tests/test_ingest_trigger.py \
            tests/test_actions_batch_grouping.py \
            tests/test_exceptions_api.py \
            tests/test_exports_api.py \
            tests/test_control_mappings_api.py \
            tests/test_evidence_export_s3.py \
            tests/test_baseline_report_api.py \
            tests/test_health_readiness.py

  backend-required-gate:
    name: Backend Required Gate
    runs-on: ubuntu-latest
    needs:
      - backend-tests
    if: ${{ always() }}
    steps:
      - name: Assert backend matrix success
        run: |
          if [ "${{ needs.backend-tests.result }}" != "success" ]; then
            echo "Backend test matrix did not pass: ${{ needs.backend-tests.result }}"
            exit 1
          fi
          echo "Backend test matrix passed."
