name: Architecture Phase 2 Reliability

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  queue-contract-and-reliability-tests:
    name: Queue Contract and Reliability Tests
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: .
      ENV: ci
      AWS_REGION: us-east-1
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/security_autopilot_ci
      DATABASE_URL_SYNC: postgresql+psycopg2://postgres:postgres@localhost:5432/security_autopilot_ci
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install -r backend/workers/requirements.txt

      - name: Run Queue Contract and Reliability Tests
        run: |
          pytest -q \
            tests/test_sqs_utils.py \
            tests/test_worker_main_contract_quarantine.py \
            tests/test_worker_polling.py \
            tests/test_reconcile_inventory_global_orchestration_worker.py \
            tests/test_cloudformation_phase2_reliability.py \
            --noconftest

  reconcile-orchestration-api-test:
    name: Reconcile Orchestration API Test
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: .
      ENV: ci
      AWS_REGION: us-east-1
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/security_autopilot_ci
      DATABASE_URL_SYNC: postgresql+psycopg2://postgres:postgres@localhost:5432/security_autopilot_ci
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install -r backend/workers/requirements.txt

      - name: Run Reconcile Orchestration API Test
        run: |
          pytest -q \
            tests/test_internal_inventory_reconcile.py \
            -k global_all_tenants_enqueues_orchestration_jobs \
            --noconftest

  architecture-phase2-required-gate:
    name: Architecture Phase 2 Required Gate
    runs-on: ubuntu-latest
    needs:
      - queue-contract-and-reliability-tests
      - reconcile-orchestration-api-test
    if: ${{ always() }}
    steps:
      - name: Assert architecture phase 2 checks success
        run: |
          if [ "${{ needs.queue-contract-and-reliability-tests.result }}" != "success" ]; then
            echo "Queue contract and reliability tests failed: ${{ needs.queue-contract-and-reliability-tests.result }}"
            exit 1
          fi
          if [ "${{ needs.reconcile-orchestration-api-test.result }}" != "success" ]; then
            echo "Reconcile orchestration API test failed: ${{ needs.reconcile-orchestration-api-test.result }}"
            exit 1
          fi
          echo "Architecture Phase 2 checks passed."
