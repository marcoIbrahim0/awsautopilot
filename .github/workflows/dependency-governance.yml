name: Dependency Governance

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  dependency-policy:
    name: Dependency Policy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate version policy
        run: |
          python - <<'PY'
          import json
          import re
          import sys
          from pathlib import Path

          errors = []

          def check_python_requirements(path: str) -> None:
            for idx, raw_line in enumerate(Path(path).read_text().splitlines(), start=1):
              line = raw_line.split("#", 1)[0].strip()
              if not line:
                continue
              if line.startswith(("-", "--")):
                continue
              if any(token in line for token in ("git+", "http://", "https://")):
                errors.append(f"{path}:{idx} disallows direct URL dependencies: {line}")
                continue
              # Policy: no loose-only minimum bounds. Every requirement must be exact
              # or include an explicit upper bound.
              if "==" in line or "~=" in line:
                continue
              if "<" not in line:
                errors.append(
                  f"{path}:{idx} must include an upper bound ('<') or exact pin ('=='): {line}"
                )

          check_python_requirements("backend/requirements.txt")
          check_python_requirements("backend/workers/requirements.txt")

          package_json_path = Path("frontend/package.json")
          package_lock_path = Path("frontend/package-lock.json")
          package_json = json.loads(package_json_path.read_text())

          if not package_lock_path.exists():
            errors.append("frontend/package-lock.json is required and must be committed")

          deps = package_json.get("dependencies", {})
          dev_deps = package_json.get("devDependencies", {})

          for dep_name in ("next", "react", "react-dom"):
            spec = deps.get(dep_name)
            if spec is None:
              errors.append(f"frontend/package.json is missing required dependency '{dep_name}'")
              continue
            if not re.fullmatch(r"\d+\.\d+\.\d+", spec):
              errors.append(
                f"frontend/package.json requires exact runtime pin for {dep_name}; found '{spec}'"
              )

          def check_node_spec(scope: str, name: str, spec: str) -> None:
            normalized = spec.strip()
            if normalized in {"*", "latest"}:
              errors.append(f"{scope}.{name} cannot use '{normalized}'")
            if any(token in normalized for token in ("git+", "file:", "http://", "https://")):
              errors.append(f"{scope}.{name} cannot use source URL specifiers: '{normalized}'")
            if normalized.startswith(">=") and "<" not in normalized:
              errors.append(
                f"{scope}.{name} uses loose-only minimum bound '{normalized}'; add upper bound"
              )

          for pkg_name, pkg_spec in deps.items():
            check_node_spec("dependencies", pkg_name, pkg_spec)
          for pkg_name, pkg_spec in dev_deps.items():
            check_node_spec("devDependencies", pkg_name, pkg_spec)

          if errors:
            print("Dependency policy violations detected:")
            for issue in errors:
              print(f"- {issue}")
            sys.exit(1)
          print("Dependency version policy checks passed.")
          PY

  python-vulnerability-scan:
    name: Python Vulnerability Scan (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: backend
            requirements: backend/requirements.txt
          - target: worker
            requirements: backend/workers/requirements.txt
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit

      - name: Scan dependencies
        run: pip-audit -r "${{ matrix.requirements }}"

  frontend-vulnerability-scan:
    name: Frontend Vulnerability Scan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Audit frontend dependencies
        run: npm audit --audit-level=high

  dependency-governance-required-gate:
    name: Dependency Governance Required Gate
    runs-on: ubuntu-latest
    needs:
      - dependency-policy
      - python-vulnerability-scan
      - frontend-vulnerability-scan
    if: ${{ always() }}
    steps:
      - name: Assert dependency governance checks success
        run: |
          if [ "${{ needs.dependency-policy.result }}" != "success" ]; then
            echo "Dependency policy check failed: ${{ needs.dependency-policy.result }}"
            exit 1
          fi
          if [ "${{ needs.python-vulnerability-scan.result }}" != "success" ]; then
            echo "Python vulnerability scan failed: ${{ needs.python-vulnerability-scan.result }}"
            exit 1
          fi
          if [ "${{ needs.frontend-vulnerability-scan.result }}" != "success" ]; then
            echo "Frontend vulnerability scan failed: ${{ needs.frontend-vulnerability-scan.result }}"
            exit 1
          fi
          echo "Dependency governance checks passed."
