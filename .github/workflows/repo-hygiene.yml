name: Repo Hygiene

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  repo-hygiene:
    name: Repo Hygiene
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate repo hygiene
        run: python scripts/check_repo_hygiene.py
