name: Worker CI Matrix

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  worker-tests:
    name: Worker Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: security_autopilot_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d security_autopilot_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      PYTHONPATH: .
      ENV: ci
      AWS_REGION: us-east-1
      SAAS_AWS_ACCOUNT_ID: "029037611564"
      JWT_SECRET: ci-test-secret
      CONTROL_PLANE_EVENTS_SECRET: ci-test-secret
      DIGEST_CRON_SECRET: ci-test-secret
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/security_autopilot_ci
      DATABASE_URL_SYNC: postgresql+psycopg2://postgres:postgres@localhost:5432/security_autopilot_ci
      SQS_INGEST_QUEUE_URL: https://sqs.us-east-1.amazonaws.com/029037611564/security-autopilot-ingest-queue
      S3_EXPORT_BUCKET: security-autopilot-ci-export-bucket
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            worker/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install -r worker/requirements.txt

      - name: Run migrations
        run: alembic upgrade head

      - name: Run worker tests
        run: |
          pytest -q \
            tests/test_worker_polling.py \
            tests/test_worker_main_contract_quarantine.py \
            tests/test_worker_ingest.py \
            tests/test_reconcile_inventory_global_orchestration_worker.py \
            tests/test_security_hub.py \
            tests/test_inspector.py \
            tests/test_direct_fix.py \
            tests/test_remediation_run_worker.py \
            tests/test_evidence_export_worker.py \
            tests/test_generate_baseline_report_worker.py

  worker-required-gate:
    name: Worker Required Gate
    runs-on: ubuntu-latest
    needs:
      - worker-tests
    if: ${{ always() }}
    steps:
      - name: Assert worker matrix success
        run: |
          if [ "${{ needs.worker-tests.result }}" != "success" ]; then
            echo "Worker test matrix did not pass: ${{ needs.worker-tests.result }}"
            exit 1
          fi
          echo "Worker test matrix passed."
