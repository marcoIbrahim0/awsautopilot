AWSTemplateFormatVersion: "2010-09-09"
Description: >
  SQS queues and IAM policies for Security Autopilot pipelines.
  - security-autopilot-ingest-dlq / queue: default ingest/remediation jobs
  - security-autopilot-events-fastlane-dlq / queue: near-real-time control-plane events
  - security-autopilot-inventory-reconcile-dlq / queue: inventory reconciliation jobs
  - security-autopilot-export-report-dlq / queue: export + baseline report jobs
  - security-autopilot-contract-quarantine-queue: malformed/unknown queue payload triage + replay
  - Two managed policies: API send-only, Worker consume-only (no DLQ access in normal operation).

# --- Queue configuration (fixed; no parameters) ---
# Standard queue (not FIFO). Visibility 960s for Lambda worker compatibility (worker timeout 900s),
# retention 14 days, long poll 20s, maxReceiveCount 3.

Parameters:
  AlarmTopicArn:
    Type: String
    Default: ""
    Description: Optional SNS topic ARN for SQS queue/DLQ CloudWatch alarms.

  IngestQueueDepthThreshold:
    Type: Number
    Default: 100
    Description: ApproximateNumberOfMessagesVisible threshold for ingest queue.
  IngestQueueAgeSecondsThreshold:
    Type: Number
    Default: 900
    Description: ApproximateAgeOfOldestMessage threshold (seconds) for ingest queue.
  IngestDLQDepthThreshold:
    Type: Number
    Default: 1
    Description: ApproximateNumberOfMessagesVisible threshold for ingest DLQ.
  IngestDLQAgeSecondsThreshold:
    Type: Number
    Default: 900
    Description: ApproximateAgeOfOldestMessage threshold (seconds) for ingest DLQ.
  IngestDLQIngressThreshold:
    Type: Number
    Default: 1
    Description: NumberOfMessagesSent threshold per 5m for ingest DLQ ingress.

  EventsQueueDepthThreshold:
    Type: Number
    Default: 100
    Description: ApproximateNumberOfMessagesVisible threshold for events fast-lane queue.
  EventsQueueAgeSecondsThreshold:
    Type: Number
    Default: 900
    Description: ApproximateAgeOfOldestMessage threshold (seconds) for events fast-lane queue.
  EventsDLQDepthThreshold:
    Type: Number
    Default: 1
    Description: ApproximateNumberOfMessagesVisible threshold for events fast-lane DLQ.
  EventsDLQAgeSecondsThreshold:
    Type: Number
    Default: 900
    Description: ApproximateAgeOfOldestMessage threshold (seconds) for events fast-lane DLQ.
  EventsDLQIngressThreshold:
    Type: Number
    Default: 1
    Description: NumberOfMessagesSent threshold per 5m for events fast-lane DLQ ingress.

  InventoryQueueDepthThreshold:
    Type: Number
    Default: 100
    Description: ApproximateNumberOfMessagesVisible threshold for inventory reconcile queue.
  InventoryQueueAgeSecondsThreshold:
    Type: Number
    Default: 900
    Description: ApproximateAgeOfOldestMessage threshold (seconds) for inventory reconcile queue.
  InventoryDLQDepthThreshold:
    Type: Number
    Default: 1
    Description: ApproximateNumberOfMessagesVisible threshold for inventory reconcile DLQ.
  InventoryDLQAgeSecondsThreshold:
    Type: Number
    Default: 900
    Description: ApproximateAgeOfOldestMessage threshold (seconds) for inventory reconcile DLQ.
  InventoryDLQIngressThreshold:
    Type: Number
    Default: 1
    Description: NumberOfMessagesSent threshold per 5m for inventory reconcile DLQ ingress.

  ExportReportQueueDepthThreshold:
    Type: Number
    Default: 25
    Description: ApproximateNumberOfMessagesVisible threshold for export/report queue.
  ExportReportQueueAgeSecondsThreshold:
    Type: Number
    Default: 1800
    Description: ApproximateAgeOfOldestMessage threshold (seconds) for export/report queue.
  ExportReportDLQDepthThreshold:
    Type: Number
    Default: 1
    Description: ApproximateNumberOfMessagesVisible threshold for export/report DLQ.
  ExportReportDLQAgeSecondsThreshold:
    Type: Number
    Default: 1800
    Description: ApproximateAgeOfOldestMessage threshold (seconds) for export/report DLQ.
  ExportReportDLQIngressThreshold:
    Type: Number
    Default: 1
    Description: NumberOfMessagesSent threshold per 5m for export/report DLQ ingress.

  ContractQuarantineQueueDepthThreshold:
    Type: Number
    Default: 1
    Description: ApproximateNumberOfMessagesVisible threshold for queue contract quarantine.
  ContractQuarantineQueueAgeSecondsThreshold:
    Type: Number
    Default: 900
    Description: ApproximateAgeOfOldestMessage threshold (seconds) for queue contract quarantine.

Conditions:
  HasAlarmTopic: !Not [!Equals [!Ref AlarmTopicArn, ""]]

Resources:
  # Create DLQs first (main queues reference them via redrive policies).
  IngestDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: security-autopilot-ingest-dlq
      MessageRetentionPeriod: 1209600
      Tags:
        - Key: Application
          Value: SecurityAutopilot
        - Key: Purpose
          Value: ingest-dlq

  IngestQueue:
    Type: AWS::SQS::Queue
    DependsOn: IngestDLQ
    Properties:
      QueueName: security-autopilot-ingest-queue
      VisibilityTimeout: 960
      MessageRetentionPeriod: 1209600
      ReceiveMessageWaitTimeSeconds: 20
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt IngestDLQ.Arn
        maxReceiveCount: 3
      Tags:
        - Key: Application
          Value: SecurityAutopilot
        - Key: Purpose
          Value: ingest

  EventsFastLaneDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: security-autopilot-events-fastlane-dlq
      MessageRetentionPeriod: 1209600
      Tags:
        - Key: Application
          Value: SecurityAutopilot
        - Key: Purpose
          Value: events-fastlane-dlq

  EventsFastLaneQueue:
    Type: AWS::SQS::Queue
    DependsOn: EventsFastLaneDLQ
    Properties:
      QueueName: security-autopilot-events-fastlane-queue
      VisibilityTimeout: 960
      MessageRetentionPeriod: 1209600
      ReceiveMessageWaitTimeSeconds: 20
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt EventsFastLaneDLQ.Arn
        maxReceiveCount: 3
      Tags:
        - Key: Application
          Value: SecurityAutopilot
        - Key: Purpose
          Value: events-fastlane

  InventoryReconcileDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: security-autopilot-inventory-reconcile-dlq
      MessageRetentionPeriod: 1209600
      Tags:
        - Key: Application
          Value: SecurityAutopilot
        - Key: Purpose
          Value: inventory-reconcile-dlq

  InventoryReconcileQueue:
    Type: AWS::SQS::Queue
    DependsOn: InventoryReconcileDLQ
    Properties:
      QueueName: security-autopilot-inventory-reconcile-queue
      VisibilityTimeout: 960
      MessageRetentionPeriod: 1209600
      ReceiveMessageWaitTimeSeconds: 20
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt InventoryReconcileDLQ.Arn
        maxReceiveCount: 3
      Tags:
        - Key: Application
          Value: SecurityAutopilot
        - Key: Purpose
          Value: inventory-reconcile

  ExportReportDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: security-autopilot-export-report-dlq
      MessageRetentionPeriod: 1209600
      Tags:
        - Key: Application
          Value: SecurityAutopilot
        - Key: Purpose
          Value: export-report-dlq

  ExportReportQueue:
    Type: AWS::SQS::Queue
    DependsOn: ExportReportDLQ
    Properties:
      QueueName: security-autopilot-export-report-queue
      VisibilityTimeout: 960
      MessageRetentionPeriod: 1209600
      ReceiveMessageWaitTimeSeconds: 20
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt ExportReportDLQ.Arn
        maxReceiveCount: 3
      Tags:
        - Key: Application
          Value: SecurityAutopilot
        - Key: Purpose
          Value: export-report

  ContractQuarantineQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: security-autopilot-contract-quarantine-queue
      VisibilityTimeout: 60
      MessageRetentionPeriod: 1209600
      ReceiveMessageWaitTimeSeconds: 20
      Tags:
        - Key: Application
          Value: SecurityAutopilot
        - Key: Purpose
          Value: contract-quarantine

  # --- IAM: API send-only (no DLQ access) ---
  ApiSendPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: SecurityAutopilotApiSqsSendPolicy
      Description: "Least-privilege SQS send for API; ingest queue only. Attach to API service role."
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: SendToWorkerQueues
            Effect: Allow
            Action:
              - sqs:SendMessage
              - sqs:GetQueueAttributes
            Resource:
              - !GetAtt IngestQueue.Arn
              - !GetAtt EventsFastLaneQueue.Arn
              - !GetAtt InventoryReconcileQueue.Arn
              - !GetAtt ExportReportQueue.Arn

  # --- IAM: Worker consume-only (no DLQ access) ---
  WorkerConsumePolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: SecurityAutopilotWorkerSqsConsumePolicy
      Description: "Least-privilege SQS consume for Worker; ingest queue only. Attach to Worker service role."
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: ConsumeFromWorkerQueues
            Effect: Allow
            Action:
              - sqs:ReceiveMessage
              - sqs:DeleteMessage
              - sqs:GetQueueAttributes
              - sqs:ChangeMessageVisibility
            Resource:
              - !GetAtt IngestQueue.Arn
              - !GetAtt EventsFastLaneQueue.Arn
              - !GetAtt InventoryReconcileQueue.Arn
              - !GetAtt ExportReportQueue.Arn
          - Sid: SendToContractQuarantineQueue
            Effect: Allow
            Action:
              - sqs:SendMessage
            Resource:
              - !GetAtt ContractQuarantineQueue.Arn

  # Ingest queue alarms
  IngestQueueDepthAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: security-autopilot-ingest-queue-depth
      AlarmDescription: Ingest queue has sustained backlog.
      Namespace: AWS/SQS
      MetricName: ApproximateNumberOfMessagesVisible
      Dimensions:
        - Name: QueueName
          Value: !GetAtt IngestQueue.QueueName
      Statistic: Average
      Period: 300
      EvaluationPeriods: 1
      DatapointsToAlarm: 1
      Threshold: !Ref IngestQueueDepthThreshold
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !If [HasAlarmTopic, !Ref AlarmTopicArn, !Ref AWS::NoValue]

  IngestQueueOldestMessageAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: security-autopilot-ingest-queue-age
      AlarmDescription: Ingest queue has stale oldest message.
      Namespace: AWS/SQS
      MetricName: ApproximateAgeOfOldestMessage
      Dimensions:
        - Name: QueueName
          Value: !GetAtt IngestQueue.QueueName
      Statistic: Maximum
      Period: 300
      EvaluationPeriods: 1
      DatapointsToAlarm: 1
      Threshold: !Ref IngestQueueAgeSecondsThreshold
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !If [HasAlarmTopic, !Ref AlarmTopicArn, !Ref AWS::NoValue]

  IngestDLQDepthAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: security-autopilot-ingest-dlq-depth
      AlarmDescription: Ingest DLQ has messages that require triage/replay.
      Namespace: AWS/SQS
      MetricName: ApproximateNumberOfMessagesVisible
      Dimensions:
        - Name: QueueName
          Value: !GetAtt IngestDLQ.QueueName
      Statistic: Average
      Period: 300
      EvaluationPeriods: 1
      DatapointsToAlarm: 1
      Threshold: !Ref IngestDLQDepthThreshold
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !If [HasAlarmTopic, !Ref AlarmTopicArn, !Ref AWS::NoValue]

  IngestDLQOldestMessageAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: security-autopilot-ingest-dlq-age
      AlarmDescription: Ingest DLQ oldest message age exceeded threshold.
      Namespace: AWS/SQS
      MetricName: ApproximateAgeOfOldestMessage
      Dimensions:
        - Name: QueueName
          Value: !GetAtt IngestDLQ.QueueName
      Statistic: Maximum
      Period: 300
      EvaluationPeriods: 1
      DatapointsToAlarm: 1
      Threshold: !Ref IngestDLQAgeSecondsThreshold
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !If [HasAlarmTopic, !Ref AlarmTopicArn, !Ref AWS::NoValue]

  IngestDLQIngressAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: security-autopilot-ingest-dlq-ingress
      AlarmDescription: Ingest DLQ is receiving new messages.
      Namespace: AWS/SQS
      MetricName: NumberOfMessagesSent
      Dimensions:
        - Name: QueueName
          Value: !GetAtt IngestDLQ.QueueName
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      DatapointsToAlarm: 1
      Threshold: !Ref IngestDLQIngressThreshold
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !If [HasAlarmTopic, !Ref AlarmTopicArn, !Ref AWS::NoValue]

