Outputs:
  IngestQueueURL:
    Description: "URL of the ingest queue (use for SQS_INGEST_QUEUE_URL)."
    Value: !Ref IngestQueue
    Export:
      Name: !Sub "${AWS::StackName}-IngestQueueURL"
  IngestQueueArn:
    Description: "ARN of the ingest queue."
    Value: !GetAtt IngestQueue.Arn
    Export:
      Name: !Sub "${AWS::StackName}-IngestQueueArn"
  IngestDLQURL:
    Description: "URL of the dead-letter queue (use for SQS_INGEST_DLQ_URL)."
    Value: !Ref IngestDLQ
    Export:
      Name: !Sub "${AWS::StackName}-IngestDLQURL"
  IngestDLQArn:
    Description: "ARN of the dead-letter queue."
    Value: !GetAtt IngestDLQ.Arn
    Export:
      Name: !Sub "${AWS::StackName}-IngestDLQArn"

  EventsFastLaneQueueURL:
    Description: "URL of the events fast-lane queue (use for SQS_EVENTS_FAST_LANE_QUEUE_URL)."
    Value: !Ref EventsFastLaneQueue
    Export:
      Name: !Sub "${AWS::StackName}-EventsFastLaneQueueURL"
  EventsFastLaneQueueArn:
    Description: "ARN of the events fast-lane queue."
    Value: !GetAtt EventsFastLaneQueue.Arn
    Export:
      Name: !Sub "${AWS::StackName}-EventsFastLaneQueueArn"
  EventsFastLaneDLQURL:
    Description: "URL of events fast-lane DLQ (use for SQS_EVENTS_FAST_LANE_DLQ_URL)."
