AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Deploys a 6-hour EventBridge scheduler that triggers global inventory reconciliation
  across all tenants in AWS Security Autopilot via API Destination.

Parameters:
  SaaSBaseUrl:
    Type: String
    Description: "Base HTTPS URL for the SaaS API (e.g. https://api.example.com)."

  ControlPlaneSecret:
    Type: String
    NoEcho: true
    Description: "Shared secret sent as X-Control-Plane-Secret for internal reconciliation endpoint auth."

  ScheduleExpression:
    Type: String
    Default: "rate(6 hours)"
    Description: "EventBridge schedule expression (default: rate(6 hours))."

  ServicesJson:
    Type: String
    Default: "[]"
    Description: "Optional JSON array for services filter (e.g. [\"ec2\",\"s3\"]). Use [] for all default services."

  RegionsJson:
    Type: String
    Default: "[]"
    Description: "Optional JSON array for regions filter (e.g. [\"us-east-1\",\"eu-north-1\"]). Use [] for account defaults."

  PrecheckAssumeRole:
    Type: String
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
    Description: "Set true to run AssumeRole precheck before enqueueing account sweeps."

  QuarantineOnAssumeRoleFailure:
    Type: String
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
    Description: "Set true to disable accounts when AssumeRole precheck fails."

  InvocationRateLimitPerSecond:
    Type: Number
    Default: 5
    MinValue: 1
    MaxValue: 300
    Description: "API Destination invocation rate limit (requests per second)."

  RetryMaximumEventAgeSeconds:
    Type: Number
    Default: 3600
    MinValue: 60
    MaxValue: 86400
    Description: "Max age of an event for target retries (seconds)."

  RetryMaximumRetryAttempts:
    Type: Number
    Default: 8
    MinValue: 0
    MaxValue: 185
    Description: "Max retry attempts for API Destination target before DLQ."

  AlarmTopicArn:
    Type: String
    Default: ""
    Description: "Optional SNS topic ARN for EventBridge/SQS alarms."

  FailedInvocationsThreshold:
    Type: Number
    Default: 1
    Description: "FailedInvocations threshold for EventBridge schedule rule alarm."

  TargetDLQDepthThreshold:
    Type: Number
    Default: 1
    Description: "ApproximateNumberOfMessagesVisible threshold for target DLQ depth alarm."

Conditions:
  HasAlarmTopic: !Not [!Equals [!Ref AlarmTopicArn, ""]]

Resources:
  ReconcileSchedulerConnection:
    Type: AWS::Events::Connection
    Properties:
      Name: !Sub "SecurityAutopilotReconcileConnection-${AWS::Region}"
      AuthorizationType: API_KEY
      AuthParameters:
        ApiKeyAuthParameters:
          ApiKeyName: X-Control-Plane-Secret
          ApiKeyValue: !Ref ControlPlaneSecret

  ReconcileSchedulerApiDestination:
    Type: AWS::Events::ApiDestination
    Properties:
      Name: !Sub "SecurityAutopilotReconcileDestination-${AWS::Region}"
      ConnectionArn: !GetAtt ReconcileSchedulerConnection.Arn
      InvocationEndpoint: !Sub "${SaaSBaseUrl}/api/internal/reconcile-inventory-global-all-tenants"
      HttpMethod: POST
      InvocationRateLimitPerSecond: !Ref InvocationRateLimitPerSecond

  ReconcileSchedulerTargetDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "security-autopilot-reconcile-scheduler-target-dlq-${AWS::Region}"
      MessageRetentionPeriod: 1209600

  ReconcileSchedulerTargetDLQPolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref ReconcileSchedulerTargetDLQ
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowEventBridgeSend
            Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sqs:SendMessage
            Resource: !GetAtt ReconcileSchedulerTargetDLQ.Arn
            Condition:
              ArnEquals:
                aws:SourceArn: !GetAtt ReconcileGlobalAllTenantsScheduleRule.Arn

  EventBridgeInvokeReconcileRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: InvokeReconcileApiDestination
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - events:InvokeApiDestination
                Resource: !GetAtt ReconcileSchedulerApiDestination.Arn

  ReconcileGlobalAllTenantsScheduleRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub "SecurityAutopilotReconcileGlobalAllTenants-${AWS::Region}"
      Description: "Trigger global inventory reconciliation for all tenants on a fixed schedule."
      ScheduleExpression: !Ref ScheduleExpression
      State: ENABLED
      Targets:
        - Id: ReconcileInventoryGlobalAllTenants
          Arn: !GetAtt ReconcileSchedulerApiDestination.Arn
          RoleArn: !GetAtt EventBridgeInvokeReconcileRole.Arn
          DeadLetterConfig:
            Arn: !GetAtt ReconcileSchedulerTargetDLQ.Arn
          RetryPolicy:
            MaximumEventAgeInSeconds: !Ref RetryMaximumEventAgeSeconds
            MaximumRetryAttempts: !Ref RetryMaximumRetryAttempts
          Input: !Sub |
            {
              "services": ${ServicesJson},
              "regions": ${RegionsJson},
              "precheck_assume_role": ${PrecheckAssumeRole},
              "quarantine_on_assume_role_failure": ${QuarantineOnAssumeRoleFailure}
            }

  ReconcileSchedulerRuleFailedInvocationsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "security-autopilot-reconcile-scheduler-failed-invocations-${AWS::Region}"
      AlarmDescription: Reconciliation EventBridge schedule rule has failed invocations.
      Namespace: AWS/Events
      MetricName: FailedInvocations
      Dimensions:
        - Name: RuleName
          Value: !Ref ReconcileGlobalAllTenantsScheduleRule
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      DatapointsToAlarm: 1
      Threshold: !Ref FailedInvocationsThreshold
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !If [HasAlarmTopic, !Ref AlarmTopicArn, !Ref AWS::NoValue]

  ReconcileSchedulerTargetDLQDepthAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "security-autopilot-reconcile-scheduler-target-dlq-depth-${AWS::Region}"
      AlarmDescription: Reconciliation EventBridge target DLQ has messages pending replay.
      Namespace: AWS/SQS
      MetricName: ApproximateNumberOfMessagesVisible
      Dimensions:
        - Name: QueueName
          Value: !GetAtt ReconcileSchedulerTargetDLQ.QueueName
      Statistic: Average
      Period: 300
      EvaluationPeriods: 1
      DatapointsToAlarm: 1
      Threshold: !Ref TargetDLQDepthThreshold
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !If [HasAlarmTopic, !Ref AlarmTopicArn, !Ref AWS::NoValue]

Outputs:
  RuleArn:
    Description: "ARN of the EventBridge schedule rule."
    Value: !GetAtt ReconcileGlobalAllTenantsScheduleRule.Arn
  ApiDestinationArn:
    Description: "ARN of the EventBridge API Destination."
    Value: !GetAtt ReconcileSchedulerApiDestination.Arn
  ConnectionArn:
    Description: "ARN of the EventBridge Connection."
    Value: !GetAtt ReconcileSchedulerConnection.Arn
  TargetDLQUrl:
    Description: "URL of EventBridge target DLQ."
    Value: !Ref ReconcileSchedulerTargetDLQ
  TargetDLQArn:
    Description: "ARN of EventBridge target DLQ."
    Value: !GetAtt ReconcileSchedulerTargetDLQ.Arn
