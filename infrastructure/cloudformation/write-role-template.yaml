# Deprecated / out of scope: customer WriteRole and direct-fix execution are disabled
# in the current product contract. Retained only for backward-compatible reference.
AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Deprecated template retained for backward-compatible reference only.
  Customer WriteRole and direct-fix execution are currently out of scope.
  Current supported onboarding uses ReadRole plus customer-run PR bundles.
  Do not deploy this template for new accounts unless the WriteRole scope is
  explicitly reactivated in the product contract.

Parameters:
  SaaSAccountId:
    Type: String
    Description: "Your SaaS AWS account ID (12 digits). This account is the only principal allowed to assume the role."
    AllowedPattern: "^[0-9]{12}$"
    ConstraintDescription: "Must be a 12-digit AWS Account ID."

  SaaSExecutionRoleArns:
    Type: String
    Default: ""
    Description: "Optional during rollout. Comma-separated SaaS execution role ARNs used to constrain trust to exact SaaS runtime roles."
    AllowedPattern: '(^$)|(^arn:(aws|aws-cn|aws-us-gov):iam::[0-9]{12}:role/[^,]+(,arn:(aws|aws-cn|aws-us-gov):iam::[0-9]{12}:role/[^,]+)*$)'
    ConstraintDescription: "Must be blank or one or more comma-separated IAM role ARNs."

  ExternalId:
    Type: String
    NoEcho: true
    Description: "Unique per tenant/customer. Must match what your SaaS stores for this tenant (same as ReadRole)."

Resources:
  WriteRoleCustomResourceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole

  WriteRoleCustomResourceRolePolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      Roles:
        - !Ref WriteRoleCustomResourceRole
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: IAMRoleAndPolicy
            Effect: Allow
            Action:
              - iam:GetRole
              - iam:CreateRole
              - iam:DeleteRole
              - iam:UpdateAssumeRolePolicy
              - iam:ListAttachedRolePolicies
              - iam:AttachRolePolicy
              - iam:DetachRolePolicy
              - iam:GetPolicy
              - iam:ListPolicies
              - iam:CreatePolicy
              - iam:DeletePolicy
              - iam:CreatePolicyVersion
              - iam:ListPolicyVersions
              - iam:DeletePolicyVersion
            Resource: "*"
          - Sid: Logs
            Effect: Allow
            Action:
              - logs:CreateLogGroup
              - logs:CreateLogStream
              - logs:PutLogEvents
            Resource: !Sub "arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/*"

  WriteRoleHelperFunction:
    Type: AWS::Lambda::Function
    DependsOn: WriteRoleCustomResourceRolePolicy
    Properties:
      Handler: index.handler
      Runtime: python3.12
      Timeout: 120
      Role: !GetAtt WriteRoleCustomResourceRole.Arn
      Code:
        ZipFile: |
          import json
          import boto3
          import cfnresponse

          ROLE_NAME = "SecurityAutopilotWriteRole"
          POLICY_NAME = "SecurityAutopilotWriteRolePolicy"

          def _trusted_role_arns(saas_execution_role_arns=""):
              return [value.strip() for value in str(saas_execution_role_arns or "").split(",") if value.strip()]

          def trust_policy(saas_account_id, external_id, saas_execution_role_arns="", partition="aws"):
              principal_arns = _trusted_role_arns(saas_execution_role_arns)
              assume_conditions = {"StringEquals": {"sts:ExternalId": external_id}}
              if principal_arns:
                  assume_conditions["ArnEquals"] = {
                      "aws:PrincipalArn": principal_arns[0] if len(principal_arns) == 1 else principal_arns
                  }
              statements = [{
                      "Sid": "AllowAssumeFromSaaSAccountWithExternalId",
                      "Effect": "Allow",
                      "Principal": {"AWS": f"arn:{partition}:iam::{saas_account_id}:root"},
                      "Action": "sts:AssumeRole",
                      "Condition": assume_conditions
                  }]
              session_statement = {
                  "Sid": "AllowSessionAuditContextFromSaaSAccount",
                  "Effect": "Allow",
                  "Principal": {"AWS": f"arn:{partition}:iam::{saas_account_id}:root"},
                  "Action": ["sts:SetSourceIdentity", "sts:TagSession"],
              }
              if principal_arns:
                  session_statement["Condition"] = {
                      "ArnEquals": {
                          "aws:PrincipalArn": principal_arns[0] if len(principal_arns) == 1 else principal_arns
                      }
                  }
              statements.append(session_statement)
              return {"Version": "2012-10-17", "Statement": statements}

          def policy_document():
              return {
                  "Version": "2012-10-17",
                  "Statement": [
                      {
                          "Sid": "S3BlockPublicAccess",
                          "Effect": "Allow",
                          "Action": [
                              "s3:GetAccountPublicAccessBlock",
                              "s3:PutAccountPublicAccessBlock"
                          ],
                          "Resource": "*"
                      },
                      {
                          "Sid": "SecurityHubEnablement",
                          "Effect": "Allow",
                          "Action": [
                              "securityhub:EnableSecurityHub",
                              "securityhub:GetEnabledStandards",
                              "securityhub:DescribeHub"
                          ],
                          "Resource": "*"
                      },
                      {
                          "Sid": "GuardDutyEnablement",
                          "Effect": "Allow",
                          "Action": [
                              "guardduty:CreateDetector",
                              "guardduty:GetDetector",
                              "guardduty:ListDetectors",
                              "guardduty:UpdateDetector"
                          ],
                          "Resource": "*"
                      },
                      {
                          "Sid": "EBSDefaultEncryption",
                          "Effect": "Allow",
                          "Action": [
                              "ec2:GetEbsEncryptionByDefault",
                              "ec2:EnableEbsEncryptionByDefault",
                              "ec2:GetEbsDefaultKmsKeyId",
                              "ec2:ModifyEbsDefaultKmsKeyId"
                          ],
                          "Resource": "*"
                      },
                      {
                          "Sid": "STSIdentityValidation",
                          "Effect": "Allow",
                          "Action": ["sts:GetCallerIdentity"],
                          "Resource": "*"
                      },
                  ]
              }

          def get_partition():
              return boto3.client("sts").get_caller_identity()["Arn"].split(":")[1]

          def find_policy_arn(iam):
              paginator = iam.get_paginator("list_policies")
              for pl in paginator.paginate(Scope="Local"):
                  for p in pl.get("Policies", []):
                      if p["PolicyName"] == POLICY_NAME:
                          return p["Arn"]
              return None

          def ensure_role_and_policy(saas_account_id, external_id, saas_execution_role_arns=""):
              iam = boto3.client("iam")
              partition = get_partition()
              trust = trust_policy(saas_account_id, external_id, saas_execution_role_arns, partition)
              policy_doc = policy_document()
              role_arn = None

              try:
                  r = iam.get_role(RoleName=ROLE_NAME)
                  role_arn = r["Role"]["Arn"]
                  iam.update_assume_role_policy(RoleName=ROLE_NAME, PolicyDocument=json.dumps(trust))
              except iam.exceptions.NoSuchEntityException:
                  try:
                      r = iam.create_role(
                          RoleName=ROLE_NAME,
                          Description="Write role for safe direct remediations: S3 Block Public Access, Security Hub, GuardDuty, EBS default encryption.",
                          AssumeRolePolicyDocument=json.dumps(trust)
                      )
                      role_arn = r["Role"]["Arn"]
                  except iam.exceptions.EntityAlreadyExistsException:
                      r = iam.get_role(RoleName=ROLE_NAME)
                      role_arn = r["Role"]["Arn"]
                      iam.update_assume_role_policy(RoleName=ROLE_NAME, PolicyDocument=json.dumps(trust))

              policy_arn = find_policy_arn(iam)
              try:
                  if not policy_arn:
                      try:
                          p = iam.create_policy(
                              PolicyName=POLICY_NAME,
                              Description="Least-privilege permissions for direct fixes (S3 Block Public Access, Security Hub, GuardDuty, EBS default encryption).",
                              PolicyDocument=json.dumps(policy_doc)
                          )
                          policy_arn = p["Policy"]["Arn"]
                      except iam.exceptions.EntityAlreadyExistsException:
                          policy_arn = find_policy_arn(iam)
                  if policy_arn:
                      vers = iam.list_policy_versions(PolicyArn=policy_arn).get("Versions", [])
                      while len(vers) >= 5:
                          for v in vers:
                              if not v["IsDefaultVersion"]:
                                  iam.delete_policy_version(PolicyArn=policy_arn, VersionId=v["VersionId"])
                                  break
                          vers = iam.list_policy_versions(PolicyArn=policy_arn).get("Versions", [])
                      iam.create_policy_version(PolicyArn=policy_arn, PolicyDocument=json.dumps(policy_doc), SetAsDefault=True)
              except Exception:
                  policy_arn = find_policy_arn(iam)

              if role_arn and policy_arn:
                  try:
                      attached = [a["PolicyArn"] for a in iam.list_attached_role_policies(RoleName=ROLE_NAME).get("AttachedPolicies", [])]
                      if policy_arn not in attached:
                          iam.attach_role_policy(RoleName=ROLE_NAME, PolicyArn=policy_arn)
                  except Exception:
                      pass

              return role_arn

          def delete_role_and_policy():
              iam = boto3.client("iam")
              try:
                  attached = iam.list_attached_role_policies(RoleName=ROLE_NAME).get("AttachedPolicies", [])
              except iam.exceptions.NoSuchEntityException:
                  return
              for a in attached:
                  iam.detach_role_policy(RoleName=ROLE_NAME, PolicyArn=a["PolicyArn"])
                  try:
                      for v in iam.list_policy_versions(PolicyArn=a["PolicyArn"]).get("Versions", []):
                          if not v["IsDefaultVersion"]:
                              iam.delete_policy_version(PolicyArn=a["PolicyArn"], VersionId=v["VersionId"])
                      iam.delete_policy(PolicyArn=a["PolicyArn"])
                  except Exception:
                      pass
              try:
                  iam.delete_role(RoleName=ROLE_NAME)
              except Exception:
                  pass

          def handler(event, context):
              try:
                  request_type = event.get("RequestType", "Create")
                  props = event.get("ResourceProperties", {})
                  saas = props.get("SaaSAccountId", "")
                  saas_execution_role_arns = props.get("SaaSExecutionRoleArns", "")
                  external = props.get("ExternalId", "")

                  if request_type == "Delete":
                      delete_role_and_policy()
                      cfnresponse.send(event, context, cfnresponse.SUCCESS, {}, event.get("PhysicalResourceId", "none"))
                      return

                  if not saas or not external:
                      cfnresponse.send(event, context, cfnresponse.FAILED, {}, reason="SaaSAccountId and ExternalId required")
                      return

                  role_arn = ensure_role_and_policy(saas, external, saas_execution_role_arns)
                  if not role_arn:
                      cfnresponse.send(event, context, cfnresponse.FAILED, {}, reason="Could not get or create role")
                      return
                  cfnresponse.send(event, context, cfnresponse.SUCCESS, {"Arn": role_arn}, role_arn)
              except Exception as e:
                  cfnresponse.send(event, context, cfnresponse.FAILED, {}, reason=str(e))

  WriteRoleCustomResource:
    Type: Custom::WriteRole
    DependsOn: WriteRoleHelperFunction
    Properties:
      ServiceToken: !GetAtt WriteRoleHelperFunction.Arn
      TemplateVersion: "v1.4.7"
      SaaSAccountId: !Ref SaaSAccountId
      SaaSExecutionRoleArns: !Ref SaaSExecutionRoleArns
      ExternalId: !Ref ExternalId

Outputs:
  WriteRoleArn:
    Description: "ARN of the created or existing deprecated WriteRole template output. Not used by the current supported onboarding path."
    Value: !Ref WriteRoleCustomResource
    Export:
      Name: !Sub "${AWS::StackName}-WriteRoleArn"
